# AI Arena local-play-bootstrap docker-compose for test_lab.
# Based on https://github.com/aiarena/local-play-bootstrap
#
# Usage: docker compose -p <project_name> up --abort-on-container-exit
#
# Bots are placed in ./bots/<bot_name>/, each with a ladderbots.json.
# Matches are defined in ./matches (one match per line).
# Results are written to ./results.json.
# Replays are saved in ./replays/.

services:
  sc2_controller:
    image: aiarena/arenaclient-sc2:v0.8.0
    environment:
      - "ACSC2_PORT=8083"
      - "ACSC2_PROXY_HOST=proxy_controller"
    volumes:
      - "./logs/sc2_controller:/logs"
      # SC2 Maps Path — configured via SystemConfig, written to .env
      - "${SC2_MAPS_PATH}:/root/StarCraftII/maps"

  bot_controller1:
    image: aiarena/arenaclient-bot:v0.8.0
    volumes:
      # Bot directories are mounted dynamically via docker-compose.override.yml
      - "./logs/bot_controller1:/logs"
    environment:
      - "ACBOT_PORT=8081"
      - "ACBOT_PROXY_HOST=proxy_controller"

  bot_controller2:
    image: aiarena/arenaclient-bot:v0.8.0
    volumes:
      # Bot directories are mounted dynamically via docker-compose.override.yml
      - "./logs/bot_controller2:/logs"
    environment:
      - "ACBOT_PORT=8082"
      - "ACBOT_PROXY_HOST=proxy_controller"

  proxy_controller:
    image: aiarena/arenaclient-proxy:v0.8.0
    environment:
      - "ACPROXY_PORT=8080"
      - "ACPROXY_BOT_CONT_1_HOST=bot_controller1"
      - "ACPROXY_BOT_CONT_2_HOST=bot_controller2"
      - "ACPROXY_SC2_CONT_HOST=sc2_controller"
    volumes:
      - "./matches:/app/matches"
      - "./config.toml:/app/config.toml"
      - "./results.json:/app/results.json"
      - "./replays:/replays"
      - "./logs:/logs"
