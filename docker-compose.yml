services:
  bot:
    build:
      context: ../../..
      dockerfile: ./python_sc2/dockerfiles/Dockerfile
    network_mode: "host"
    working_dir: /root
    volumes:
      - ./runner:/root/runner
      - ${SC2_MAPS_PATH}:/root/StarCraftII/Maps
      - ${REPLAYS_DIR}:/root/replays
    command: bash /root/runner/run_docker.sh
